version: 2
four_closure_policy:
  purpose: Require independent proof that a material change is complete.
  closures:
    functional:
      question: Does the implemented behavior satisfy the admitted product rules?
      required_evidence: executable_tests_or_equivalent_deterministic_proof
    negative:
      question: Are forbidden and failure paths explicitly exercised?
      required_evidence: negative_tests_or_contract_refusals
    structural:
      question: Does the result preserve module, dependency, and authority boundaries?
      required_evidence: build_lint_static_checks_and_boundary_validators
    drift_resistance:
      question: Will deterministic checks reject a future divergence?
      required_evidence: committed_validator_or_reproducible_check
  acceptance:
    all_four_must_be_explicit_for_material_change: true
    missing_closure_is_not_success: true
    evidence_format_and_review_process_are_host_owned: true
