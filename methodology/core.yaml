version: 3
methodology:
  id: nimi-coding
  mission: Preserve explicit product authority while AI-assisted changes are designed, implemented, and verified by the host environment.
  package_boundary:
    owns:
      - methodology_principles
      - spec_construction_contracts
      - managed_methodology_and_contract_projections
      - deterministic_spec_and_governance_validation
    does_not_own:
      - task_planning
      - task_state
      - agent_delegation
      - implementation_execution
      - review_or_approval_state
      - provider_runtime
  principles:
    - authority_before_convenience
    - explicit_complexity_over_ambiguous_simplicity
    - root_cause_over_local_patch
    - no_pseudo_success
    - evidence_must_not_override_authority
    - generated_views_are_never_canonical
    - unresolved_semantic_forks_fail_closed
  authority_order:
    - host_product_spec
    - package_methodology_and_contracts
    - local_non_authority_evidence
    - implementation
  host_integration:
    execution_owner: host_native_capabilities
    constraint: nimi-coding_outputs_may_inform_but_must_not_orchestrate_host_execution
