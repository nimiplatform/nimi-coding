version: 2
role_separation_policy:
  purpose: Prevent one perspective from silently defining authority, implementation, and acceptance.
  logical_responsibilities:
    authority_authoring:
      owns: [product_intent, normative_rules, explicit_semantic_decisions]
      must_not_self_validate: implementation_conformance
    implementation:
      owns: [code_changes, migrations, executable_tests]
      must_not_self_authorize: product_semantic_changes
    verification:
      owns: [contract_checks, negative_evidence, structural_and_drift_proof]
      must_not_rewrite: product_authority_to_make_results_pass
  separation_rule:
    required: responsibilities_remain_distinguishable_in_evidence_and_decisions
    mechanism: host_owned
    physical_agent_or_session_topology: not_prescribed
  failure_conditions:
    - implementation_invents_missing_authority
    - verification_accepts_pseudo_success
    - generated_evidence_is_promoted_to_authority
    - unresolved_owner_ambiguity_is_silently_resolved
