version: 2
contract:
  id: nimicoding.spec-migration-inventory.v2
  owner: nimi-coding
  purpose: Describe a non-mutating migration plan for spec surface cleanup.
required_entry_fields: [source_path, current_inferred_class, target_class, disposition, target_root, owner, required_confirmation, ambiguity, evidence, validation_commands]
target_class_enum: [product_authority, product_authority_table, thin_guidance, host_instruction, tracked_derived_projection, derived_view, spec_generation_state, audit_evidence_state, operational_local_artifact, methodology_authority, nimicoding_managed_projection, host_projection_anchor, support_registry]
disposition_enum: [keep, move_package, move_local, split, rewrite, delete, block]
required_confirmation_enum: [none, product_semantic_fork, owner_ambiguity, package_boundary_ambiguity, destructive_deletion]
plan_fields: [contract, ok, version, root, inventory, disposition_enum, target_class_enum, semantic_constraints, summary, enum_validation, required_confirmations, groups, migration_groups, mutation_policy]
semantic_constraints:
  - inventory_and_plan_commands_must_not_modify_source_files
  - unresolved_semantic_forks_remain_blocking
  - migration_groups_are_descriptive_and_do_not_schedule_work
  - emitted_plans_are_local_non_authority_state
