version: 2
contract:
  id: nimicoding.projection-edge.v2
  owner: nimi-coding
  purpose: Declare one-way projections without granting source authority to the projection.
required_top_level_fields: [version, projection_edges, edge_kind_enum, semantic_constraints]
projection_edge_required_fields: [edge_id, edge_kind, source_ref, source_class, source_owner, target_ref, target_class, target_owner, allowed_fields, forbidden_fields, drift_check_command]
projection_edges:
  - edge_id: package_to_managed_methodology
    edge_kind: package_to_managed_projection
    source_ref: package://@nimiplatform/nimi-coding/methodology/**
    source_class: methodology_authority
    source_owner: nimi-coding
    target_ref: .nimi/methodology/**
    target_class: nimicoding_managed_projection
    target_owner: nimi-coding
    allowed_fields: [all_package_owned_fields]
    forbidden_fields: [host_product_authority_override]
    drift_check_command: pnpm exec nimicoding sync --check
  - edge_id: package_to_managed_contracts
    edge_kind: package_to_managed_projection
    source_ref: package://@nimiplatform/nimi-coding/contracts/**
    source_class: methodology_authority
    source_owner: nimi-coding
    target_ref: .nimi/contracts/**
    target_class: nimicoding_managed_projection
    target_owner: nimi-coding
    allowed_fields: [all_package_owned_fields]
    forbidden_fields: [host_product_authority_override]
    drift_check_command: pnpm exec nimicoding sync --check
  - edge_id: package_to_managed_config
    edge_kind: package_to_managed_projection
    source_ref: package://@nimiplatform/nimi-coding/config/**
    source_class: methodology_authority
    source_owner: nimi-coding
    target_ref: .nimi/config/**
    target_class: nimicoding_managed_projection
    target_owner: nimi-coding
    allowed_fields: [package_owned_defaults]
    forbidden_fields: [host_product_authority_override]
    drift_check_command: pnpm exec nimicoding sync --check
edge_kind_enum: [package_to_managed_projection, package_to_host_anchor, authority_to_derived_view, authority_to_audit_evidence]
semantic_constraints:
  - projection_target_must_not_gain_more_authority_than_source
  - projection_edges_do_not_define_execution_order
  - drift_checks_must_be_deterministic
