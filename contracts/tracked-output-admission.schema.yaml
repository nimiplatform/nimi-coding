version: 2
contract:
  id: nimicoding.tracked-output-admission.v2
  owner: nimi-coding
  purpose: Make every tracked non-product output explicit and narrow.
required_top_level_fields: [version, admissions, semantic_constraints]
admission_required_fields: [root, allowed_artifact_classes, owner, rationale, validation_commands]
admissions: []
default_policy:
  tracked_non_product_outputs: forbidden_without_explicit_admission
  local_operational_outputs_root: .nimi/local
  generated_views: stdout_only
semantic_constraints:
  - empty_admission_list_is_valid_and_means_no_tracked_non_product_outputs
  - admission_does_not_promote_output_to_product_authority
  - output_root_must_not_overlap_.nimi/spec
  - validation_commands_must_be_deterministic
