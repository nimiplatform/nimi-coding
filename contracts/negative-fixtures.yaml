    setup: package://@nimiplatform/nimi-coding/contracts/surface-taxonomy.schema.yaml copied under .nimi/spec/project/kernel
    expected_failure: package_methodology_under_host_spec
  - id: unknown-domain
    setup: .nimi/spec/unadmitted/kernel/index.md
    expected_failure: missing_domain_admission
  - id: table-without-family
    setup: .nimi/spec/project/kernel/tables/rules.yaml without table_family
    expected_failure: missing_table_family
