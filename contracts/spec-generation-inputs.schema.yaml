version: 3
input_contract:
  id: canonical_spec_generation_inputs
  owner: nimi-coding
  purpose: Admit class-filtered evidence for spec construction without owning the host's execution process.
required_fields:
  - mode
  - canonical_target_root
  - code_inputs
  - docs_inputs
  - structure_inputs
  - local_inputs
  - forbidden_source_classes
  - generation_order
  - inference_rules
  - acceptance_mode
mode_enum: [class_filtered]
acceptance_mode_enum:
  - placement_validity_before_generation
  - semantic_and_structural_parity_when_blueprint_exists
generation_order_enum:
  - classify_inputs
  - validate_placement
  - product_authority
  - product_authority_tables
  - thin_guides
  - derived_views
  - generation_audit
docs_input_required_fields:
  - root
  - class_filter
  - allowed_surface_classes
  - forbidden_surface_classes
  - owner
  - use_as_authority
  - projection_edge_ref
local_input_required_fields: [root, owner, allowed_surface_classes, use_as_authority]
hard_constraints:
  - docs_roots_blanket_ingestion_is_forbidden
  - each_input_file_must_have_an_accepted_surface_class_before_render
  - local_inputs_must_not_be_used_as_product_authority
  - generated_or_audit_material_must_not_be_promoted_to_product_authority
  - host_native_execution_state_is_outside_this_contract
