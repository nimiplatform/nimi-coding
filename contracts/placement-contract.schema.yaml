version: 2
contract:
  id: nimicoding.placement-contract.v2
  owner: nimi-coding
  purpose: Bind each governed root to its allowed authority class.
required_top_level_fields: [version, placement_rules, root_policy, forbidden_roots, fail_closed_cases]
placement_rule_required_fields: [root_pattern, allowed_classes, owner, tracking_policy, requires_admission, validator_scope]
shared_enum_ref: package://@nimiplatform/nimi-coding/contracts/shared-enums.yaml
placement_rules:
  - root_pattern: .nimi/spec/<domain>/**/*.authority.yaml
    allowed_classes: [product_authority]
    owner: product_domain
    tracking_policy: tracked_required
    requires_admission: domain_admission
    validator_scope: product_authority
  - root_pattern: .nimi/spec/<domain>/**/*.authority.md
    allowed_classes: [product_authority]
    owner: product_domain
    tracking_policy: tracked_required
    requires_admission: domain_admission
    validator_scope: product_authority
  - root_pattern: .nimi/spec/<domain>/kernel/*.md
    allowed_classes: [product_authority]
    owner: product_domain
    tracking_policy: tracked_required
    requires_admission: domain_admission
    validator_scope: product_authority
  - root_pattern: .nimi/spec/<domain>/kernel/tables/*.yaml
    allowed_classes: [product_authority_table, support_registry]
    owner: product_domain
    tracking_policy: tracked_required
    requires_admission: domain_admission_and_table_family
    validator_scope: table_family
  - root_pattern: .nimi/spec/<domain>/*.md
    allowed_classes: [thin_guidance]
    owner: product_domain
    tracking_policy: tracked_required
    requires_admission: domain_admission
    validator_scope: thin_guidance
  - root_pattern: .nimi/spec/INDEX.md
    allowed_classes: [thin_guidance]
    owner: product_domain
    tracking_policy: tracked_required
    requires_admission: none
    validator_scope: thin_guidance
  - root_pattern: host-spec-layout://host_instruction_paths
    allowed_classes: [host_instruction]
    owner: product_host
    tracking_policy: tracked_only_with_explicit_admission
    requires_admission: host_spec_layout
    validator_scope: host_instruction
  - root_pattern: host-spec-layout://tracked_derived_projections
    allowed_classes: [tracked_derived_projection]
    owner: generator
    tracking_policy: tracked_only_with_explicit_admission
    requires_admission: host_spec_layout
    validator_scope: tracked_derived_projection
  - root_pattern: .nimi/spec/_meta/<package>-admission-anchor.yaml
    allowed_classes: [host_projection_anchor]
    owner: host_projection
    tracking_policy: tracked_only_with_explicit_admission
    requires_admission: projection_edge
    validator_scope: host_projection
  - root_pattern: .nimi/config/host-overlay.yaml
    allowed_classes: [host_projection_anchor]
    owner: host_projection
    tracking_policy: tracked_only_with_explicit_admission
    requires_admission: none
    validator_scope: host_overlay
  - root_pattern: .nimi/methodology/authority-authoring.yaml
    allowed_classes: [nimicoding_managed_projection]
    owner: nimi_coding_package_projection
    tracking_policy: tracked_required
    requires_admission: nimicoding_start_or_sync_projection
    validator_scope: nimicoding_managed_projection
  - root_pattern: .nimi/config/spec-generation-inputs.yaml
    allowed_classes: [support_registry]
    owner: product_host
    tracking_policy: tracked_required
    requires_admission: nimicoding_start_or_sync_projection
    validator_scope: host_state_seed
  - root_pattern: .nimi/contracts/domain-admission.schema.yaml
    allowed_classes: [support_registry]
    owner: product_host
    tracking_policy: tracked_required
    requires_admission: nimicoding_start_or_sync_projection
    validator_scope: host_profile_override
  - root_pattern: .nimi/config/spec-layout.yaml
    allowed_classes: [support_registry]
    owner: product_host
    tracking_policy: tracked_only_with_explicit_admission
    requires_admission: none
    validator_scope: host_config
  - root_pattern: .nimi/config/governance.yaml
    allowed_classes: [support_registry]
    owner: product_host
    tracking_policy: tracked_only_with_explicit_admission
    requires_admission: none
    validator_scope: host_config
  - root_pattern: package://@nimiplatform/nimi-coding/{spec,methodology,contracts,config}/**
    allowed_classes: [methodology_authority, support_registry]
    owner: nimi_coding_package
    tracking_policy: tracked_required
    requires_admission: package_authority
    validator_scope: package_authority
  - root_pattern: .nimi/local/state/spec-generation/**
    allowed_classes: [spec_generation_state]
    owner: spec_generator
    tracking_policy: local_only
    requires_admission: none
    validator_scope: spec_generation_state
  - root_pattern: .nimi/local/audit/**
    allowed_classes: [audit_evidence_state, operational_local_artifact]
    owner: verification_process
    tracking_policy: local_only
    requires_admission: none
    validator_scope: audit_evidence
  - root_pattern: .nimi/local/**
    allowed_classes: [operational_local_artifact]
    owner: external_tooling
    tracking_policy: local_only
    requires_admission: none
    validator_scope: operational_local
  - root_pattern: .nimi/{derived,state,audit}/**
    allowed_classes: [derived_view, spec_generation_state, audit_evidence_state]
    owner: tracked_output_admission
    tracking_policy: tracked_only_with_explicit_admission
    requires_admission: tracked_output_admission
    validator_scope: tracked_output
allowed_spec_meta_rules:
  - root_pattern: .nimi/spec/_meta/<package>-admission-anchor.yaml
    allowed_classes: [host_projection_anchor]
    required_fields: [package_id, package_version, package_truth_root, projection_edges, must_not_override]
  - root_pattern: .nimi/spec/_meta/**
    allowed_classes: []
    allowed_dispositions: [move_package, move_local, delete]
root_policy:
  product_authority_root: .nimi/spec
  package_authority_root: package://@nimiplatform/nimi-coding
  local_artifact_root: .nimi/local
  tracked_non_product_roots:
    default: disabled
    roots: [.nimi/derived, .nimi/state, .nimi/audit]
forbidden_roots:
  derived_view: [".nimi/spec/**/kernel/generated/**", ".nimi/spec/generated/**", ".nimi/local/derived/**"]
  spec_generation_state: [".nimi/spec/**"]
  audit_evidence_state: [".nimi/spec/**"]
  operational_local_artifact: [".nimi/spec/**"]
  methodology_authority: [".nimi/spec/**"]
  tracked_derived_projection: ["unadmitted:.nimi/spec/**/kernel/generated/**", "unadmitted:.nimi/spec/generated/**"]
forbidden_root_exceptions:
  nimicoding_managed_projection: [".nimi/methodology/authority-authoring.yaml"]
fail_closed_cases:
  - root_has_no_matching_placement_rule
  - surface_class_not_allowed_for_root
  - required_admission_missing
  - non_product_state_stored_under_product_authority
  - generated_projection_under_spec_without_host_layout_admission
  - package_methodology_copied_under_product_authority
  - tracked_non_product_output_missing_admission
semantic_constraints:
  - placement_is_validated_independently_of_host_execution
  - local_evidence_must_not_become_product_authority
