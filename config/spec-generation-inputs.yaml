version: 3
contract_ref: package://@nimiplatform/nimi-coding/contracts/spec-generation-inputs.schema.yaml
spec_generation_inputs:
  mode: class_filtered
  canonical_target_root: .nimi/spec
  code_inputs: []
  docs_inputs:
    - root: .nimi/spec
      class_filter: product_authority_only
      allowed_surface_classes: [product_authority, product_authority_table, thin_guidance, host_projection_anchor, support_registry]
      forbidden_surface_classes: [derived_view, tracked_derived_projection, spec_generation_state, audit_evidence_state, operational_local_artifact, nimicoding_managed_projection, methodology_authority]
      owner: nimi_host
      use_as_authority: true
      projection_edge_ref: null
  structure_inputs: []
  local_inputs:
    - root: .nimi/local
      owner: external_tooling
      allowed_surface_classes: [spec_generation_state, audit_evidence_state, operational_local_artifact]
      use_as_authority: false
  forbidden_source_classes:
    - derived_view
    - tracked_derived_projection
    - spec_generation_state
    - audit_evidence_state
    - operational_local_artifact
    - nimicoding_managed_projection
  generation_order:
    - classify_inputs
    - validate_placement
    - product_authority
    - product_authority_tables
    - thin_guides
    - derived_views
    - generation_audit
  inference_rules:
    - no_blanket_docs_roots
    - no_generated_as_authority
    - no_derived_views_written_to_local
    - no_audit_or_operational_state_as_authority
  acceptance_mode: placement_validity_before_generation
