authorities:
  - surface: .nimi/**
    owner: repository_local_truth
    role: primary_ai_truth_layer
    notes: ai agents must treat project-local .nimi truth as canonical for governance decisions
  - surface: templates/bootstrap/**
    owner: package_bootstrap_seed
    role: bootstrap_only_seed_surface
    notes: template assets define init and repair output for external projects and must remain vendor-neutral
  - surface: src/cli/**
    owner: package_runtime_surface
    role: bootstrap_validation_and_projection_cli
    notes: CLI may seed truth, validate truth, and project handoff payloads but does not own reconstruction reasoning
  - surface: README.md
    owner: derived_projection
    role: human_readable_overview
    notes: README describes the admitted product surface but does not override .nimi truth
ownership_rules:
  - rule: .nimi/spec/** owns package methodology and governance truth for this repository
  - rule: templates/bootstrap/** owns distributable bootstrap seed contents and must stay aligned with admitted bootstrap truth
  - rule: src/cli/** implements bootstrap and validation behavior and must defer semantic authority to .nimi/**
  - rule: external runtime ownership remains delegated to the declared external_ai_host contract surfaces
escalation_paths:
  - trigger: bootstrap truth drifts from templates or CLI behavior
    required_action: repair template and CLI alignment before extending runtime surface
  - trigger: a change would introduce self-hosting, scheduler ownership, or provider-bound execution
    required_action: reject unless a new admitted packet explicitly expands product boundaries
  - trigger: README or entrypoint guidance diverges from .nimi truth
    required_action: update projection surfaces to match .nimi rather than editing authority into prose
