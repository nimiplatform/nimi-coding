boundaries:
  - boundary: bootstrap_cli_vs_skill_reasoning
    allowed: CLI may seed, repair, validate, and hand off declared skill work
    forbidden: CLI must not perform project authority reasoning or pretend local runtime ownership
  - boundary: standalone_boundary_completion_vs_promoted_runtime_parity
    allowed: standalone may be complete for bootstrap, contracts, handoff, validation, projection, and explicit admission without matching promoted runtime command parity
    forbidden: missing run kernel, scheduler, provider, notification, or automation surfaces must not be treated as standalone defects once the declared boundary-complete profile is satisfied
  - boundary: package_truth_vs_local_operational_state
    allowed: .nimi/local/** may store closeout artifacts and installer evidence as local-only state
    forbidden: local operational artifacts must not become semantic truth
  - boundary: explicit_manager_admission_vs_automatic_promotion
    allowed: explicit manager-owned admission may summarize validated local decision state into tracked semantic truth
    forbidden: local projections must not auto-promote themselves into canonical truth
  - boundary: product_core_vs_upper_engineering_extensions
    allowed: contracts may seed packetized execution schemas, validators, and external-host interop boundaries
    forbidden: run kernel, scheduler, automation, notification, webhook, telegram, and provider runtime remain deferred
invariants:
  - .nimi/** remains the primary AI truth surface for this repository
  - no human-friendly parallel truth may outrank .nimi/spec/**
  - bootstrap templates must stay bootstrap-only even when this repository itself is reconstruction_seeded
  - runtime ownership stays delegated to external_ai_host until explicitly admitted otherwise
  - methodology posture remains risk-shaped, inline-manager-worker by default, and continuity-agnostic
  - standalone completion posture remains boundary_complete rather than promoted_runtime_parity
fail_closed_rules:
  - fail if bootstrap contracts drift across manifest, runtime, installer, host-profile, and handoff truth
  - fail if reconstruction_seeded is declared while any target truth file is missing or structurally invalid
  - fail if completed closeout claims contradict the current target truth state
  - fail if canonical high-risk admission proceeds without explicit manager-owned reviewed decision state
  - fail if validators are used to imply semantic acceptance or runtime ownership they do not own
  - fail if package-owned standalone completion truth drifts into claiming run kernel, provider runtime, scheduler, notification, or automation ownership
