surfaces:
  - surface: .nimi/methodology/**
    owner: package_truth
    ownership_mode: tracked_authority
    approval_requirements:
      - maintain bootstrap boundary and delegated runtime posture
  - surface: .nimi/spec/**
    owner: repository_local_truth
    ownership_mode: tracked_authority
    approval_requirements:
      - preserve no-parallel-truth and fail-closed governance semantics
  - surface: templates/bootstrap/**
    owner: package_bootstrap_seed
    ownership_mode: tracked_bootstrap_seed
    approval_requirements:
      - keep init and repair output aligned with package-owned bootstrap truth
  - surface: src/cli/**
    owner: package_runtime_surface
    ownership_mode: tracked_implementation
    approval_requirements:
      - do not exceed admitted bootstrap and validator responsibilities
  - surface: .nimi/local/**
    owner: local_operator
    ownership_mode: local_only
    approval_requirements:
      - never promote local state into tracked semantic truth
ownership_modes:
  - tracked_authority means the file directly defines AI-consumable product truth
  - tracked_bootstrap_seed means the file defines distributable bootstrap-only defaults
  - tracked_implementation means the file implements bounded package behavior under authority from .nimi/**
  - local_only means the file may exist during execution but is not semantic truth
approval_requirements:
  - any change that broadens runtime ownership beyond delegated external skills requires an explicit new admitted design packet
  - any change that alters target truth section shape must update contracts, templates, doctor, and tests together
  - any change that updates managed entrypoint guidance must remain projection-only and subordinate to .nimi/**
