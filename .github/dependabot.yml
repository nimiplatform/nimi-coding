version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "03:00"
      timezone: UTC
    open-pull-requests-limit: 4
    rebase-strategy: auto
    cooldown:
      semver-major-days: 30
      semver-minor-days: 7
      semver-patch-days: 3
    groups:
      npm-security:
        applies-to: security-updates
        patterns:
          - "*"
      npm-minor-patch:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - minor
          - patch
      npm-major:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - major

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "03:30"
      timezone: UTC
    open-pull-requests-limit: 4
    rebase-strategy: auto
    cooldown:
      semver-major-days: 14
      semver-minor-days: 7
      semver-patch-days: 3
    groups:
      github-actions-security:
        applies-to: security-updates
        patterns:
          - "*"
      github-actions-all:
        applies-to: version-updates
        patterns:
          - "*"
