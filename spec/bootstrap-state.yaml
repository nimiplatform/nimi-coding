version: 2
state:
  mode: bootstrap_only
  tree_state: bootstrap_only
  authority_mode: external_authority_active
  blueprint_mode: none
  reconstruction_required: true
  reconstruction_owner: ai_skills
lifecycle_contract:
  id: nimicoding.spec-bootstrap-state.v2
  state_carrier_ref: package://@nimiplatform/nimi-coding/spec/bootstrap-state.yaml
  posture_carrier_ref: package://@nimiplatform/nimi-coding/spec/product-scope.yaml
  tree_state_enum:
    - bootstrap_only
    - spec_tree_seeded
    - canonical_tree_in_progress
    - canonical_tree_ready
  authority_mode_enum:
    - external_authority_active
    - canonical_cutover_ready
    - canonical_active
  blueprint_mode_enum:
    - none
    - repo_spec_blueprint
    - custom_blueprint
  blueprint_mode_semantics:
    none: external_blueprint_reference_is_not_declared_in_project_local_truth
    repo_spec_blueprint: project_local_blueprint_reference_declares_repo_spec_root_for_redesign_or_audit
    custom_blueprint: project_local_blueprint_reference_declares_a_non_repo_blueprint_root
  legacy_mode_mapping:
    - legacy_mode: bootstrap_only
      tree_state: bootstrap_only
      authority_mode: external_authority_active
      blueprint_mode: none
      reconstruction_required: true
      ready_for_ai_reconstruction: true
    - legacy_mode: reconstruction_seeded
      tree_state: canonical_tree_in_progress
      authority_mode: external_authority_active
      blueprint_mode: none
      reconstruction_required: false
      ready_for_ai_reconstruction: false
  fail_closed_rules:
    - unknown_tree_state_is_invalid
    - unknown_authority_mode_is_invalid
    - unknown_blueprint_mode_is_invalid
    - legacy_mode_must_map_to_declared_multi_axis_state
    - canonical_active_requires_explicit_cutover_readiness
current_truth:
  admitted_files:
    - package://@nimiplatform/nimi-coding/methodology/core.yaml
    - package://@nimiplatform/nimi-coding/methodology/spec-reconstruction.yaml
    - package://@nimiplatform/nimi-coding/methodology/skill-runtime.yaml
    - package://@nimiplatform/nimi-coding/methodology/skill-installer-result.yaml
    - package://@nimiplatform/nimi-coding/methodology/skill-installer-summary-projection.yaml
    - package://@nimiplatform/nimi-coding/methodology/skill-exchange-projection.yaml
    - package://@nimiplatform/nimi-coding/methodology/skill-handoff.yaml
    - package://@nimiplatform/nimi-coding/spec/_meta/spec-tree-model.yaml
    - package://@nimiplatform/nimi-coding/spec/_meta/command-gating-matrix.yaml
    - package://@nimiplatform/nimi-coding/spec/_meta/spec-authority-cutover-readiness.yaml
    - package://@nimiplatform/nimi-coding/spec/_meta/generate-drift-migration-checklist.yaml
    - package://@nimiplatform/nimi-coding/spec/_meta/governance-routing-cutover-checklist.yaml
    - package://@nimiplatform/nimi-coding/spec/_meta/phase2-impacted-surface-matrix.yaml
    - package://@nimiplatform/nimi-coding/spec/product-scope.yaml
    - package://@nimiplatform/nimi-coding/spec/bootstrap-state.yaml
    - package://@nimiplatform/nimi-coding/config/bootstrap.yaml
    - package://@nimiplatform/nimi-coding/config/skills.yaml
    - package://@nimiplatform/nimi-coding/config/skill-manifest.yaml
    - package://@nimiplatform/nimi-coding/config/host-profile.yaml
    - package://@nimiplatform/nimi-coding/config/host-adapter.yaml
    - package://@nimiplatform/nimi-coding/config/external-execution-artifacts.yaml
    - package://@nimiplatform/nimi-coding/config/skill-installer.yaml
    - package://@nimiplatform/nimi-coding/config/installer-evidence.yaml
    - package://@nimiplatform/nimi-coding/contracts/spec-reconstruction-result.yaml
    - package://@nimiplatform/nimi-coding/contracts/doc-spec-audit-result.yaml
    - package://@nimiplatform/nimi-coding/contracts/high-risk-execution-result.yaml
    - package://@nimiplatform/nimi-coding/contracts/high-risk-admission.schema.yaml
