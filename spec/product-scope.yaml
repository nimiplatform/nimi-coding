version: 3
product:
  package_name: "@nimiplatform/nimi-coding"
  mission: methodology_spec_construction_and_deterministic_validation
owned_surfaces:
  - bootstrap_and_sync_of_managed_.nimi_projections
  - methodology_principles
  - spec_surface_taxonomy_and_placement_contracts
  - spec_construction_inputs_and_generation_audit_contracts
  - deterministic_spec_governance_and_ai_governance_checks
out_of_scope:
  - planning_or_task_lifecycle
  - agent_or_provider_orchestration
  - implementation_execution
  - review_approval_or_completion_state
  - host_prompt_or_context_management
  - scheduling_notifications_and_automation
integration_contract:
  host_owns_execution: true
  nimi_coding_may_emit_non_mutating_analysis: true
  nimi_coding_may_validate_declared_artifacts: true
  nimi_coding_must_not_create_host_execution_state: true
canonical_roots:
  package_authority: package://@nimiplatform/nimi-coding
  host_product_authority: .nimi/spec
  managed_projection_roots: [.nimi/config, .nimi/contracts, .nimi/methodology]
  local_non_authority_root: .nimi/local
