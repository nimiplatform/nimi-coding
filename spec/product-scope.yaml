version: 6
product:
  package_name: "@nimiplatform/nimi-coding"
  mission: canonical_authority_methodology_formatter_compiler_primitives_and_deterministic_gates
owned_surfaces:
  - compact_authority_authoring_methodology
  - exact_authority_guide_projection_and_managed_instruction_blocks
  - canonical_authority_format_and_complete_root_check
  - private_compile_bounded_lexical_discovery_exact_query_and_declared_outgoing_context
  - semantic_diff_and_declared_review_impact
  - bounded_direct_references_exact_relation_paths_and_local_subgraphs
  - project_bound_deterministic_authority_audit_and_SARIF_projection
  - git_aware_exact_read_only_authority_change_review
  - stable_current_worktree_authority_to_package_script_target_evidence
  - optional_L3_repository_governance_not_authority_admission
canonical_boundary:
  host_product_authority: .nimi/spec/**/*.authority.{yaml,md}
  sole_conformance_gate: nimicoding_authority_check_complete_.nimi/spec
  historical_format_inference: forbidden
  product_semantic_generation: forbidden
surface_separation:
  public: [documented_CLI, package_documentation]
  canonical_project_owned: .nimi/spec/**/*.authority.{yaml,md}
  projected_AI_visible_package_owned: [.nimi/methodology/authority-authoring.yaml, AGENTS.md#managed-block, CLAUDE.md#managed-block]
  local_non_authority: .nimi/local/**
  package_internal: [authority_grammar_contracts, AuthorityIR, SourceMap, compiler_implementation]
out_of_scope:
  - reconstruction_taxonomy_tables_guidance_registries_and_generation_audits
  - profile_specific_authority_validation
  - planning_task_lifecycle_delegation_execution_review_or_approval
  - host_workflow_command_aggregation
  - sqlite_cache_incremental_embedding_semantic_search_visualization_AI_execution_or_Atlas
claims:
  discovery: bounded_deterministic_lexical_candidates_not_semantic_search_selection_or_absence_proof
  context: complete_declared_outgoing_interpretation_closure_not_complete_task_context
  impact: declared_review_obligation_not_sync_or_completion_proof
  graph: complete_bounded_explicit_relation_navigation_not_semantic_inference_or_raw_IR
  audit: governance_bound_verifier_results_not_prose_predicate_inference_or_plugin_execution
  review: immutable_base_OID_and_stable_worktree_exact_snapshots_composed_through_existing_compiler_diff_impact_and_current_audit_oracles
  evidence: exact_identity_bound_package_script_target_reachability_and_external_supplied_observations_not_command_execution_test_success_runtime_reachability_or_conformance_attestation
