version: 2
product:
  package_name: "@nimiplatform/nimi-coding"
  mission: ai_native_coding_governance_toolkit
target_experience:
  install_step: "npm install -D @nimiplatform/nimi-coding"
  bootstrap_step: "npx nimicoding start"
  reconstruction_owner: ai_skills
  canonical_spec_root: ".nimi/spec"
  phase_one_posture: contract_and_checklist_only
methodology_posture:
  risk_shape: authority_bearing_or_high_risk_only
  execution_default: inline_manager_worker
  continuity_model: continuity_agnostic
standalone_completion:
  profile: boundary_complete
  completed_surfaces:
    - bootstrap
    - doctor
    - handoff
    - sweep_audit
    - sweep_design
    - validators
    - topic_lifecycle_report_methodology
    - closeout
    - ingest
    - review
    - decision
    - admission
    - host_overlay_recognition
  deferred_execution_surfaces:
    - packet_bound_run_kernel
    - provider_backed_execution
    - scheduler
    - notification
    - automation_backend
    - multi_topic_orchestration
  promoted_parity_gap_summary:
    - packet_bound_run_kernel
    - provider_backed_execution
    - scheduler_automation_notification
canonical_spec_model:
  state_carrier_ref: package://@nimiplatform/nimi-coding/spec/bootstrap-state.yaml
  posture_carrier_ref: package://@nimiplatform/nimi-coding/spec/product-scope.yaml
  phase_one_contracts:
    - package://@nimiplatform/nimi-coding/spec/_meta/spec-tree-model.yaml
    - package://@nimiplatform/nimi-coding/spec/_meta/command-gating-matrix.yaml
    - package://@nimiplatform/nimi-coding/spec/_meta/spec-authority-cutover-readiness.yaml
    - package://@nimiplatform/nimi-coding/spec/_meta/generate-drift-migration-checklist.yaml
    - package://@nimiplatform/nimi-coding/spec/_meta/governance-routing-cutover-checklist.yaml
    - package://@nimiplatform/nimi-coding/spec/_meta/phase2-impacted-surface-matrix.yaml
    - package://@nimiplatform/nimi-coding/spec/bootstrap-state.yaml
    - package://@nimiplatform/nimi-coding/spec/product-scope.yaml
    - package://@nimiplatform/nimi-coding/contracts/sweep-design-result.yaml
  blocked_until_phase_two:
    - command_behavior_rewrites_not_admitted
    - authority_cutover_not_admitted
    - physical_spec_tree_migration_not_admitted
  high_risk_admission_evidence: .nimi/local/high-risk-admissions.yaml
