version: 2
spec_tree_model:
  profile: surface_taxonomy_v1
  product_authority_root: .nimi/spec
  package_authority_root: package://@nimiplatform/nimi-coding
  authority_mode: surface_class_validated
  contract_refs:
    shared_enums: package://@nimiplatform/nimi-coding/contracts/shared-enums.yaml
    surface_taxonomy: package://@nimiplatform/nimi-coding/contracts/surface-taxonomy.schema.yaml
    placement_contract: package://@nimiplatform/nimi-coding/contracts/placement-contract.schema.yaml
    projection_edge: package://@nimiplatform/nimi-coding/contracts/projection-edge.schema.yaml
    table_family: package://@nimiplatform/nimi-coding/contracts/table-family.schema.yaml
    domain_admission: package://@nimiplatform/nimi-coding/contracts/domain-admission.schema.yaml
    tracked_output_admission: package://@nimiplatform/nimi-coding/contracts/tracked-output-admission.schema.yaml
    migration_inventory: package://@nimiplatform/nimi-coding/contracts/migration-inventory.schema.yaml
    workflow_consumer: package://@nimiplatform/nimi-coding/contracts/workflow-consumer.schema.yaml
  domains:
    - id: project
      root: .nimi/spec/project
      authority_class: active_product
      allowed_surface_classes: [product_authority, product_authority_table, thin_guidance, support_registry]
  product_authority_classes:
    - id: product_authority
      path_patterns:
        - .nimi/spec/**/kernel/*.md
      allowed_extensions:
        - .md
      authority_rank: active_product_canonical
      required_admission: domain_admission
    - id: product_authority_table
      path_patterns:
        - .nimi/spec/**/kernel/tables/**/*.yaml
        - .nimi/spec/**/kernel/tables/**/*.yml
      allowed_extensions:
        - .yaml
        - .yml
      authority_rank: active_product_canonical
      required_admission: domain_admission_and_table_family
  guidance_classes:
    - id: thin_guidance
      path_patterns:
        - .nimi/spec/**/*.md
      excluded_path_patterns:
        - .nimi/spec/**/kernel/*.md
      must_reference_product_authority_ids: true
      must_not_define_rule_body: true
      authority_rank: guidance_only
  non_authority_classes:
    - id: derived_view
      allowed_roots:
        - stdout_view
      forbidden_roots:
        - .nimi/spec/**/kernel/generated/**
        - .nimi/spec/generated/**
      tracking_policy: untracked_stdout_only
    - id: spec_generation_state
      allowed_roots:
        - .nimi/local/state/spec-generation/**
      forbidden_roots:
        - .nimi/spec/_meta/spec-generation-audit.yaml
        - .nimi/spec/_meta/spec-generation-audit/**
      tracking_policy: local_only
    - id: audit_evidence_state
      allowed_roots:
        - .nimi/local/audit/**
      forbidden_roots:
        - .nimi/spec/**
      tracking_policy: local_only
    - id: lifecycle_progress_state
      allowed_roots:
        - .nimi/topics/**
        - .nimi/local/state/**
      forbidden_roots:
        - .nimi/spec/**
      tracking_policy: local_only
    - id: candidate_roadmap
      allowed_roots:
        - .nimi/topics/**
      forbidden_roots:
        - .nimi/spec/**
      tracking_policy: local_only
  package_authority_classes:
    - id: methodology_authority
      allowed_roots:
        - package://@nimiplatform/nimi-coding/spec/**
        - package://@nimiplatform/nimi-coding/methodology/**
        - package://@nimiplatform/nimi-coding/contracts/**
        - package://@nimiplatform/nimi-coding/config/**
      forbidden_roots:
        - .nimi/spec/**
      authority_rank: package_canonical
  support_classes:
    - id: host_projection_anchor
      allowed_roots:
        - .nimi/spec/_meta/<package>-admission-anchor.yaml
        - .nimi/config/host-overlay.yaml
      required_contract: package://@nimiplatform/nimi-coding/contracts/projection-edge.schema.yaml
      must_be_minimal: true
    - id: nimicoding_managed_projection
      allowed_roots:
        - .nimi/methodology/**
        - .nimi/contracts/**
        - .nimi/config/**
      required_contract: package://@nimiplatform/nimi-coding/contracts/projection-edge.schema.yaml
  required_files:
    surface_taxonomy_v1:
      - .nimi/spec/INDEX.md
      - .nimi/spec/project/kernel/index.md
      - .nimi/spec/project/kernel/core-rules.md
      - .nimi/spec/project/kernel/tables/rule-catalog.yaml
    minimal:
      - .nimi/spec/INDEX.md
      - .nimi/spec/project/kernel/index.md
      - .nimi/spec/project/kernel/core-rules.md
      - .nimi/spec/project/kernel/tables/rule-catalog.yaml
    standard:
      - .nimi/spec/INDEX.md
    mature:
      - .nimi/spec/INDEX.md
  generated_pipelines:
    - id: spec_human_doc
      owner_surface: nimi-coding
      input_contract_ref: package://@nimiplatform/nimi-coding/contracts/spec-generation-inputs.schema.yaml
      input_config_ref: package://@nimiplatform/nimi-coding/config/spec-generation-inputs.yaml
      output_class: derived_view
      output_roots:
        - stdout_view
      audit_output_root: .nimi/local/state/spec-generation
      generate_command: pnpm exec nimicoding generate-spec-derived-docs --profile nimi --scope spec-human-doc
      drift_check_command: pnpm exec nimicoding generate-spec-derived-docs --profile nimi --scope spec-human-doc --check
  fail_closed_rules:
    - unknown_profile_is_invalid
    - unclassified_files_are_invalid
    - path_shape_is_not_authority_proof
    - domain_roots_must_not_escape_product_authority_root
    - product_authority_table_without_table_family_is_invalid
    - generated_outputs_must_not_overlap_product_authority_roots
    - audit_and_lifecycle_state_must_not_live_under_.nimi/spec
    - package_methodology_must_not_be_copied_to_host_product_authority
    - future_or_backlog_content_under_.nimi/spec_is_invalid
