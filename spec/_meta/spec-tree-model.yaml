version: 3
spec_tree_model:
  profile: surface_taxonomy_v2
  product_authority_root: .nimi/spec
  package_authority_root: package://@nimiplatform/nimi-coding
  authority_mode: surface_class_validated
  contract_refs:
    shared_enums: package://@nimiplatform/nimi-coding/contracts/shared-enums.yaml
    surface_taxonomy: package://@nimiplatform/nimi-coding/contracts/surface-taxonomy.schema.yaml
    placement_contract: package://@nimiplatform/nimi-coding/contracts/placement-contract.schema.yaml
    projection_edge: package://@nimiplatform/nimi-coding/contracts/projection-edge.schema.yaml
    table_family: package://@nimiplatform/nimi-coding/contracts/table-family.schema.yaml
    domain_admission: package://@nimiplatform/nimi-coding/contracts/domain-admission.schema.yaml
    tracked_output_admission: package://@nimiplatform/nimi-coding/contracts/tracked-output-admission.schema.yaml
    migration_inventory: package://@nimiplatform/nimi-coding/contracts/migration-inventory.schema.yaml
  domains:
    - id: project
      root: .nimi/spec/project
      authority_class: active_product
      allowed_surface_classes: [product_authority, product_authority_table, thin_guidance, support_registry]
  required_files:
    surface_taxonomy_v2:
      - .nimi/spec/INDEX.md
      - .nimi/spec/project/kernel/index.md
      - .nimi/spec/project/kernel/core-rules.md
      - .nimi/spec/project/kernel/tables/rule-catalog.yaml
  generated_pipelines:
    - id: spec_human_doc
      input_contract_ref: package://@nimiplatform/nimi-coding/contracts/spec-generation-inputs.schema.yaml
      input_config_ref: package://@nimiplatform/nimi-coding/config/spec-generation-inputs.yaml
      output_class: derived_view
      output_roots: [stdout_view]
      audit_output_root: .nimi/local/state/spec-generation
      generate_command: pnpm exec nimicoding generate-spec-derived-docs --profile nimi --scope spec-human-doc
      drift_check_command: pnpm exec nimicoding generate-spec-derived-docs --profile nimi --scope spec-human-doc --check
  fail_closed_rules:
    - unknown_profile_is_invalid
    - unclassified_files_are_invalid
    - path_shape_is_not_authority_proof
    - domain_roots_must_not_escape_product_authority_root
    - product_authority_table_without_table_family_is_invalid
    - generated_outputs_must_not_overlap_product_authority_roots
    - operational_and_audit_state_must_not_live_under_.nimi/spec
    - package_methodology_must_not_be_copied_to_host_product_authority
