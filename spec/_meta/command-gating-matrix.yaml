version: 1
command_gating_matrix:
  - command: start
    allowed_tree_states:
      - bootstrap_only
      - spec_tree_seeded
      - canonical_tree_in_progress
      - canonical_tree_ready
    allowed_authority_modes:
      - external_authority_active
      - canonical_cutover_ready
      - canonical_active
    notes:
      - seeds_or_continues_canonical_tree_work
      - must_not_infer_completion_from_compact_target_files
  - command: doctor
    allowed_tree_states:
      - bootstrap_only
      - spec_tree_seeded
      - canonical_tree_in_progress
      - canonical_tree_ready
    allowed_authority_modes:
      - external_authority_active
      - canonical_cutover_ready
      - canonical_active
    reports:
      - tree_state
      - authority_mode
      - blueprint_mode
      - file_class_validity
      - pipeline_readiness
  - command: handoff
    skill: spec_reconstruction
    allowed_tree_states:
      - bootstrap_only
      - spec_tree_seeded
      - canonical_tree_in_progress
    allowed_authority_modes:
      - external_authority_active
      - canonical_cutover_ready
      - canonical_active
  - command: handoff
    skill: doc_spec_audit
    allowed_tree_states:
      - canonical_tree_in_progress
      - canonical_tree_ready
    allowed_authority_modes:
      - external_authority_active
      - canonical_cutover_ready
      - canonical_active
  - command: handoff
    skill: audit_sweep
    allowed_tree_states:
      - canonical_tree_ready
    allowed_authority_modes:
      - external_authority_active
      - canonical_cutover_ready
      - canonical_active
  - command: sweep audit
    replaces:
      - audit-sweep
    allowed_tree_states:
      - canonical_tree_ready
    allowed_authority_modes:
      - external_authority_active
      - canonical_cutover_ready
      - canonical_active
    writes:
      - .nimi/local/audit/**
    rules:
      - top_level_audit_sweep_is_not_a_canonical_entrypoint
      - audit_findings_remain_local_operational_evidence_until_admitted_through_topic_or_closeout
      - remediation_map_output_is_candidate_planning_input_not_worker_dispatch_authority
  - command: sweep design
    allowed_tree_states:
      - canonical_tree_ready
    allowed_authority_modes:
      - external_authority_active
      - canonical_cutover_ready
      - canonical_active
    reads:
      - .nimi/local/audit/evidence/<sweep-id>/findings.yaml
    writes:
      - .nimi/local/sweep-design/<run-id>/**
    rules:
      - source_audit_findings_are_read_only
      - intake_forks_findings_into_a_design_workset
      - cluster_groups_findings_by_owner_authority_root_cause_contract_and_repair_target
      - fork_review_must_resolve_to_authority_ref_or_mark_authority_alignment_required
      - focused_plan_stops_on_user_decision
      - wave_plan_is_non_mutating_and_worker_dispatch_remains_disallowed_until_topic_admission
  - command: handoff
    skill: high_risk_execution
    allowed_tree_states:
      - canonical_tree_ready
    allowed_authority_modes:
      - external_authority_active
      - canonical_cutover_ready
      - canonical_active
  - command: closeout
    skill: spec_reconstruction
    completed_requires:
      tree_state: canonical_tree_ready
      canonical_required_files_valid: true
      spec_generation_audit_valid: true
  - command: closeout
    skill: doc_spec_audit
    completed_requires:
      tree_state: canonical_tree_ready
      audit_references_canonical_root: true
  - command: closeout
    skill: audit_sweep
    completed_requires:
      tree_state: canonical_tree_ready
      canonical_required_files_valid: true
      spec_generation_audit_valid: true
  - command: closeout
    skill: high_risk_execution
    completed_requires:
      tree_state: canonical_tree_ready
      canonical_required_files_valid: true
      high_risk_admissions_truth_ref: .nimi/spec/high-risk-admissions.yaml
  - command: ingest-high-risk-execution
    requires:
      tree_state: canonical_tree_ready
      authority_mode:
        - external_authority_active
        - canonical_cutover_ready
        - canonical_active
  - command: review-high-risk-execution
    requires:
      tree_state: canonical_tree_ready
  - command: decide-high-risk-execution
    requires:
      tree_state: canonical_tree_ready
  - command: admit-high-risk-decision
    requires:
      tree_state: canonical_tree_ready
      canonical_admissions_truth: .nimi/spec/high-risk-admissions.yaml
    allowed_authority_modes:
      - external_authority_active
      - canonical_cutover_ready
      - canonical_active
